<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Submit a product review including rating, features, and feedback.">
  <meta name="author" content="Jared Larsen">

  <title>Product Review Form</title>

  <link rel="stylesheet" href="styles/form.css">
  <script defer src="scripts/form.js"></script>
</head>

<body>

<header>
  <h1>Product Review Form</h1>
</header>

<main>
  <form method="get" action="review.html">

    
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    
   <fieldset>
  <legend>Overall Rating</legend>

  <input type="radio" id="rating1" name="rating" value="1" required>
  <label for="rating1">☆</label>

  <input type="radio" id="rating2" name="rating" value="2" required>
  <label for="rating2">☆☆</label>

  <input type="radio" id="rating3" name="rating" value="3" required>
  <label for="rating3">☆☆☆</label>

  <input type="radio" id="rating4" name="rating" value="4" required>
  <label for="rating4">☆☆☆☆</label>

  <input type="radio" id="rating5" name="rating" value="5" required>
  <label for="rating5">☆☆☆☆☆</label>

</fieldset>

    
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    
    <fieldset>
  <legend>Useful Features</legend>

  <input type="checkbox" id="feature1" name="features" value="Durable">
  <label for="feature1">Durable</label>

  <input type="checkbox" id="feature2" name="features" value="Lightweight">
  <label for="feature2">Lightweight</label>

  <input type="checkbox" id="feature3" name="features" value="Affordable">
  <label for="feature3">Affordable</label>

  <input type="checkbox" id="feature4" name="features" value="Easy to Use">
  <label for="feature4">Easy to Use</label>

</fieldset>

    
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username">

    
    <input type="submit" value="Submit Review">

  </form>
</main>

<footer>
  <p>© <span id="currentyear"></span> Jared Larsen</p>
  <p id="lastModified"></p>
</footer>

</body>
</html>
