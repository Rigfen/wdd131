<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Book your paragliding adventure.">
  <meta name="author" content="Jared Larsen">
  <title>Contact | Paragliding Adventures</title>

  <link rel="stylesheet" href="styles/paraglide.css">
  <script src="scripts/paraglide.js" defer></script>
</head>

<body>

<header>
  <div class="header-container">
    <img src="images/logo.avif" alt="Paragliding logo" class="logo">
    <h1>Paragliding Adventures!</h1>
  </div>

  <nav>
    <a href="paraglide.html">Home</a>
    <a href="flights.html">Flights</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="contact-page">

  <h2>Book a Flight</h2>
  <p class="subtitle">Fill out the form below and we’ll get you flying!</p>

  <form class="contact-form">

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label for="experience">Experience Level</label>
      <select id="experience" name="experience" required>
        <option value="">Select</option>
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
      </select>
    </div>


    <div class="form-group">
      <label for="date">Preferred Flight Date</label>
      <input type="date" id="date" name="date" required>
    </div>

    <button type="submit">Book Now</button>

  </form>

</main>

<footer>
  <p>© <span id="currentyear"></span> Jared Larsen</p>
  <p id="lastModified"></p>
</footer>

</body>
</html>
